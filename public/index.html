<!-- public/index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIT - Web3 Decentralized Exchange</title>
    
    <!-- Midtrans Snap JS (untuk modal payment) -->
    <script type="text/javascript" 
            src="https://app.sandbox.midtrans.com/snap/snap.js" 
            data-client-key="SB-Mid-client-GANTI_DENGAN_CLIENT_KEY_KAMU">
    </script>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Custom Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --bg-main: #060709;
            --bg-panel: #101216;
            --bg-sidebar: #0b0e11;
            --border: #1f2329;
            --accent-green: #00d06c;
            --accent-red: #f6465d;
            --accent-orange: #e85d04;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-main); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .logo-font { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Sidebar Navigation */
        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            overflow: hidden;
        }
        
        /* Collapsed Sidebar State */
        .sidebar.collapsed {
            width: 72px;
        }
        
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .logo-full,
        .sidebar.collapsed #btn-text,
        .sidebar.collapsed #network-badge,
        .sidebar.collapsed .sidebar-footer-text {
            display: none;
        }
        
        .sidebar.collapsed .nav-link {
            justify-content: center;
            padding: 14px;
            gap: 0;
        }
        
        .sidebar.collapsed .nav-link i {
            font-size: 20px;
            margin: 0;
        }
        
        .sidebar.collapsed .logo-container {
            justify-content: center;
            padding: 0;
        }
        
        .sidebar.collapsed .logo-short {
            display: block;
        }
        
        .logo-short {
            display: none;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-green);
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }
        
        .nav-link.active {
            color: var(--accent-green);
            background: rgba(0,208,108,0.1);
            border-right: 2px solid var(--accent-green);
        }
        
        .nav-link i { font-size: 18px; min-width: 18px; text-align: center; }
        
        /* Main Content Area */
        #main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            transition: margin-left 0.3s ease;
        }
        
        /* Panels */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        
        /* Utility Colors */
        .green { color: var(--accent-green); }
        .red { color: var(--accent-red); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
        
        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 1.5s infinite; }
        
        /* ApexCharts Tooltip Override */
        .apexcharts-tooltip {
            background: #121418 !important;
            border: 1px solid var(--border) !important;
            color: white !important;
            border-radius: 8px !important;
        }
        
        /* Sidebar Toggle Button */
        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            z-index: 10;
        }
        .sidebar-toggle:hover {
            background: var(--border);
            color: var(--text-primary);
        }
        .sidebar.collapsed .sidebar-toggle {
            right: -12px;
            transform: translateY(-50%) rotate(180deg);
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 50;
                transform: translateX(0);
                transition: transform 0.3s ease;
            }
            .sidebar.collapsed {
                transform: translateX(-168px);
            }
            #main-content {
                margin-left: 0 !important;
            }
        }
    </style>
</head>
<body class="h-screen flex">

    <!-- SIDEBAR (Global Navigation) -->
    <aside class="sidebar shrink-0 relative" id="main-sidebar">
        <!-- Toggle Button -->
        <div class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">
            <i class="bi bi-chevron-left text-xs"></i>
        </div>
        
        <!-- Logo -->
        <div class="h-20 flex items-center px-6 border-b border-[#1f2329] logo-container">
            <h1 class="logo-font text-2xl tracking-widest font-bold text-white logo-full">ORBIT</h1>
            <span class="logo-short">O</span>
        </div>
        
        <!-- Navigation Menu -->
        <nav class="flex-1 py-4">
            <div class="nav-link active" data-route="trading" onclick="navigate('trading')">
                <i class="bi bi-graph-up"></i>
                <span class="nav-text">Trading</span>
            </div>
            <div class="nav-link" data-route="market" onclick="navigate('market')">
                <i class="bi bi-bar-chart-fill"></i>
                <span class="nav-text">Market</span>
            </div>
            <div class="nav-link" data-route="wallet" onclick="navigate('wallet')">
                <i class="bi bi-wallet2"></i>
                <span class="nav-text">Wallet</span>
            </div>
            <div class="nav-link" data-route="news" onclick="navigate('news')">
                <i class="bi bi-newspaper"></i>
                <span class="nav-text">News</span>
            </div>
            <div class="nav-link" data-route="tax" onclick="navigate('tax')">
                <i class="bi bi-receipt"></i>
                <span class="nav-text">Tax Center</span>
            </div>
        </nav>
        
        <!-- Wallet Connect Section -->
        <div class="p-4 border-t border-[#1f2329] sidebar-footer">
            <button id="btn-connect" onclick="connectWallet()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                <span>🦊</span>
                <span id="btn-text">Connect Wallet</span>
            </button>
            <div id="network-badge" class="hidden mt-3 px-3 py-1.5 rounded-lg bg-yellow-900/30 border border-yellow-700 text-[10px] text-yellow-500 font-bold uppercase tracking-wider text-center sidebar-footer-text">
                Sepolia Testnet
            </div>
            <!-- Wallet Status in Header Style (for consistency) -->
            <div id="wallet-status-mini" class="hidden mt-2 text-[10px] text-[#00d06c] text-center sidebar-footer-text">
                <i class="bi bi-patch-check-fill"></i> <span id="wallet-address-mini"></span>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA (Dynamic Content Loads Here) -->
    <!-- ⚠️ ID "main-content" WAJIB ADA untuk SPA routing -->
    <main id="main-content" class="flex-1 overflow-hidden">
        <!-- Header with Wallet Status (Global) -->
        <header id="main-header" class="h-20 shrink-0 flex items-center justify-between px-8 border-b border-[#1f2329] bg-[#0b0e11]">
            <div>
                <h2 id="page-title" class="text-2xl font-bold text-white">Loading...</h2>
                <p id="page-subtitle" class="text-sm text-gray-400 mt-1"></p>
            </div>
            <div class="flex items-center gap-4">
                <!-- Global Wallet Status Badge -->
                <div class="text-right">
                    <div class="font-semibold text-sm text-white">MetaMask</div>
                    <div id="wallet-status" class="text-[10px] text-gray-500 flex items-center justify-end gap-1 mt-0.5">
                        <i class="bi bi-wallet"></i> Not Connected
                    </div>
                </div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" class="w-8 h-8" alt="MetaMask" />
            </div>
        </header>
        
        <!-- Dynamic Partial Content -->
        <div id="partial-container" class="p-4">
            <!-- Initial loading state -->
            <div class="flex items-center justify-center h-[calc(100vh-80px)]">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-10 w-10 border-2 border-[#00d06c] border-t-transparent mx-auto mb-4"></div>
                    <div class="text-gray-500 text-sm">Memuat ORBIT...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Global App JavaScript -->
    <script>
    // ==========================================
    // GLOBAL WALLET SYNC MANAGER
    // ==========================================
    
    // Initialize wallet state from localStorage
    window.userAddress = localStorage.getItem('orbit_wallet_address') || null;
    window.provider = null;
    window.signer = null;
    
    // Update wallet status globally
    function updateGlobalWalletStatus(connected, address = null) {
        if (connected && address) {
            window.userAddress = address;
            localStorage.setItem('orbit_wallet_address', address);
        } else {
            window.userAddress = null;
            localStorage.removeItem('orbit_wallet_address');
        }
        
        // Broadcast to all partials
        window.dispatchEvent(new CustomEvent('wallet:statusChanged', {
            detail: { connected, address }
        }));
        
        // Update all UI elements
        syncAllWalletUI(connected, address);
    }
    
    // Sync wallet UI in header, sidebar, and partials
    function syncAllWalletUI(connected, address) {
        // Header wallet status
        const headerStatus = document.getElementById('wallet-status');
        if (headerStatus) {
            if (connected && address) {
                const short = `${address.slice(0, 6)}...${address.slice(-4)}`;
                headerStatus.innerHTML = `<i class="bi bi-patch-check-fill text-[#00d06c]"></i> ${short}`;
                headerStatus.className = 'text-[10px] text-[#00d06c] flex items-center justify-end gap-1 mt-0.5 font-medium';
            } else {
                headerStatus.innerHTML = '<i class="bi bi-wallet"></i> Not Connected';
                headerStatus.className = 'text-[10px] text-gray-500 flex items-center justify-end gap-1 mt-0.5';
            }
        }
        
        // Sidebar mini status
        const miniStatus = document.getElementById('wallet-status-mini');
        const miniAddress = document.getElementById('wallet-address-mini');
        const btnConnect = document.getElementById('btn-connect');
        const btnText = document.getElementById('btn-text');
        const networkBadge = document.getElementById('network-badge');
        
        if (connected && address) {
            if (miniStatus) miniStatus.classList.remove('hidden');
            if (miniAddress) miniAddress.textContent = `${address.slice(0, 8)}...${address.slice(-6)}`;
            if (btnConnect) {
                btnConnect.classList.replace('bg-blue-600', 'bg-[#2b3139]');
                btnConnect.classList.add('border', 'border-[#00d06c]');
            }
            if (btnText) btnText.textContent = `${address.slice(0, 6)}...${address.slice(-4)}`;
            if (networkBadge) networkBadge.classList.remove('hidden');
        } else {
            if (miniStatus) miniStatus.classList.add('hidden');
            if (btnConnect) {
                btnConnect.classList.replace('bg-[#2b3139]', 'bg-blue-600');
                btnConnect.classList.remove('border', 'border-[#00d06c]');
            }
            if (btnText) btnText.textContent = 'Connect Wallet';
            if (networkBadge) networkBadge.classList.add('hidden');
        }
    }
    
    // Global connect wallet function
    async function connectWallet() {
        if (!window.ethereum) {
            alert('🦊 Install MetaMask dulu!');
            return;
        }
        
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const address = accounts[0];
            
            // Init provider & signer
            window.provider = new ethers.providers.Web3Provider(window.ethereum);
            window.signer = window.provider.getSigner();
            
            // Update global state
            updateGlobalWalletStatus(true, address);
            
            console.log('✅ Wallet connected:', address);
            
        } catch (err) {
            console.error('❌ Connect error:', err);
            if (err.code === 4001) {
                alert('❌ Koneksi dibatalkan di MetaMask');
            } else {
                alert('Gagal connect: ' + err.message);
            }
        }
    }
    
    // Listen MetaMask native events
    if (window.ethereum) {
        window.ethereum.on('accountsChanged', (accounts) => {
            if (accounts.length === 0) {
                updateGlobalWalletStatus(false);
            } else {
                updateGlobalWalletStatus(true, accounts[0]);
                // Re-init provider
                window.provider = new ethers.providers.Web3Provider(window.ethereum);
                window.signer = window.provider.getSigner();
            }
        });
        
        window.ethereum.on('chainChanged', () => {
            location.reload();
        });
    }
    
    // Sync on page load
    document.addEventListener('DOMContentLoaded', () => {
        const savedAddress = localStorage.getItem('orbit_wallet_address');
        if (savedAddress) {
            updateGlobalWalletStatus(true, savedAddress);
            if (window.ethereum) {
                window.provider = new ethers.providers.Web3Provider(window.ethereum);
                window.signer = window.provider.getSigner();
            }
        } else {
            updateGlobalWalletStatus(false);
        }
    });
    
    // Expose to global scope
    window.connectWallet = connectWallet;
    window.updateGlobalWalletStatus = updateGlobalWalletStatus;
    window.syncAllWalletUI = syncAllWalletUI;
    
    // ==========================================
    // SIDEBAR TOGGLE FUNCTIONALITY
    // ==========================================
    
    function toggleSidebar() {
        const sidebar = document.getElementById('main-sidebar');
        const mainContent = document.getElementById('main-content');
        
        if (sidebar) {
            sidebar.classList.toggle('collapsed');
            
            // Optional: adjust main content margin (if needed)
            // if (mainContent) {
            //     if (sidebar.classList.contains('collapsed')) {
            //         mainContent.style.marginLeft = '72px';
            //     } else {
            //         mainContent.style.marginLeft = '240px';
            //     }
            // }
            
            // Save preference
            const isCollapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem('orbit_sidebar_collapsed', isCollapsed);
        }
    }
    
    // Restore sidebar state on load
    document.addEventListener('DOMContentLoaded', () => {
        const isCollapsed = localStorage.getItem('orbit_sidebar_collapsed') === 'true';
        const sidebar = document.getElementById('main-sidebar');
        if (isCollapsed && sidebar) {
            sidebar.classList.add('collapsed');
        }
    });
    
    // ==========================================
    // SPA ROUTING SYSTEM
    // ==========================================
    
    // Page titles & subtitles mapping
    const PAGE_CONFIG = {
        trading: { title: 'Trading Terminal', subtitle: 'Trade crypto assets on-chain with real-time market data.' },
        market: { title: 'Market Overview', subtitle: 'Pantau harga crypto dan kelola portofolio anda.' },
        wallet: { title: 'Wallet', subtitle: 'Tambahkan dana ke akun anda, dan mulailah trading.' },
        news: { title: 'Crypto News', subtitle: 'Berita terbaru seputar cryptocurrency dan blockchain.' },
        tax: { title: 'Tax Center', subtitle: 'Kelola laporan pajak trading crypto anda.' }
    };
    
    // Navigate to partial page
    async function navigate(route, params = {}) {
        console.log(`🔀 Navigating to: ${route}`, params);
        
        // Update active nav link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.toggle('active', link.dataset.route === route);
        });
        
        // Update page header
        const config = PAGE_CONFIG[route];
        if (config) {
            document.getElementById('page-title').textContent = config.title;
            document.getElementById('page-subtitle').textContent = config.subtitle;
        }
        
        // Show loading
        const container = document.getElementById('partial-container');
        if (container) {
            container.innerHTML = `
                <div class="flex items-center justify-center h-[calc(100vh-120px)]">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-10 w-10 border-2 border-[#00d06c] border-t-transparent mx-auto mb-4"></div>
                        <div class="text-gray-500 text-sm">Memuat ${config?.title || route}...</div>
                    </div>
                </div>
            `;
        }
        
        try {
            // Fetch partial HTML
            const res = await fetch(`/partials/${route}.html`);
            if (!res.ok) throw new Error(`Failed to load ${route}.html`);
            
            const html = await res.text();
            
            // Inject into container
            if (container) {
                container.innerHTML = html;
            }
            
            // Execute script in partial if exists
            const script = container?.querySelector('#' + route + '-script');
            if (script && script.textContent) {
                try {
                    // Execute the script
                    const fn = new Function(script.textContent);
                    fn();
                    
                    // Call init function if exists
                    const initFn = window['init' + route.charAt(0).toUpperCase() + route.slice(1)];
                    if (typeof initFn === 'function') {
                        initFn();
                    }
                } catch (e) {
                    console.error(`❌ Script error in ${route}.html:`, e);
                }
            }
            
            // Sync wallet UI after partial loads
            if (window.userAddress) {
                syncAllWalletUI(true, window.userAddress);
            }
            
            console.log(`✅ Loaded ${route} partial`);
            
        } catch (err) {
            console.error('❌ Navigation error:', err);
            if (container) {
                container.innerHTML = `
                    <div class="text-center text-red-500 py-10">
                        <i class="bi bi-exclamation-triangle text-4xl mb-4"></i>
                        <p class="text-lg">Gagal memuat halaman ${route}</p>
                        <p class="text-sm text-gray-500 mt-2">${err.message}</p>
                        <button onclick="navigate('${route}')" class="mt-4 px-4 py-2 bg-[#2b3139] rounded text-white hover:bg-[#3b4149]">
                            🔄 Retry
                        </button>
                    </div>
                `;
            }
        }
    }
    
    // Handle browser back/forward
    window.addEventListener('popstate', (e) => {
        if (e.state?.route) {
            navigate(e.state.route, e.state.params);
        }
    });
    
    // Initialize on DOM ready
    document.addEventListener('DOMContentLoaded', () => {
        // Load default route
        const defaultRoute = 'trading';
        navigate(defaultRoute);
        
        // Update URL without reload
        const url = new URL(window.location);
        url.searchParams.set('route', defaultRoute);
        window.history.replaceState({ route: defaultRoute }, '', url);
    });
    
    // Expose navigate to global scope
    window.navigate = navigate;

window.CONTRACT_ADDRESS = "0xfFE1F8afC7E780d37F4C3dF7B67cDd5DB66af160";
window.CONTRACT_ABI = [
    "function deposit(address _user, uint256 _amount, string _method, string _txRef) public",
    "function getBalance(address _user) public view returns (uint256)",
    "function buyAsset(string _symbol, uint256 _price, uint256 _qty) public",
    "function sellAsset(string _symbol, uint256 _price, uint256 _qty) public",
    "function getUserPortfolio(address _user) public view returns (tuple(string symbol, uint256 quantity, uint256 avgBuyPrice, uint256 lastUpdated)[])",
    "function getTrades(address _user) public view returns (tuple(string symbol, string side, uint256 price, uint256 qty, uint256 timestamp)[])",
    "function getUserDeposits(address _user) public view returns (tuple(address user, uint256 amount, string method, uint256 timestamp, string txRef)[])"
];
</script>
    
    <!-- External App JS (optional, for additional logic) -->
    <script src="/js/app.js"></script>
</body>
</html>
